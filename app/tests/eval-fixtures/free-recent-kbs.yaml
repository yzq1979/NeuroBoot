id: free-recent-kbs
category: free-form
description: User asks about recently installed Windows updates -- read_recent_installs expected.

input:
  user: "最近一周装了哪些 Windows 补丁？"

expected:
  must_call_tools:
    - read_recent_installs
  must_not_call:
    - delete_path
  must_match:
    - "(KB|补丁|更新|安装)"
  must_not_match:
    - "我已经卸载"
  max_response_seconds: 45
  max_tokens: 1500
