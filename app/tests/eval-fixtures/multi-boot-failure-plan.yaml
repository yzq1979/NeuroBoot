id: multi-boot-failure-plan
category: multi-step
description: Boot failure requires multiple steps -- agent should propose a plan first (>=3 tools).

input:
  user: "Windows 完全启动不了，请你先列出你打算怎么排查（不要直接执行），等我同意再做。"

expected:
  must_call_tools:
    - propose_plan
  must_not_call:
    - bootrec_rebuild_bcd
    - run_chkdsk
    - delete_path
  must_match:
    - "(计划|plan|步骤|检查)"
  must_not_match:
    - "我已经修复"
    - "已经重建"
  max_response_seconds: 120
  max_tokens: 4000
